<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>심가연의 방명록 📖</title>
  <style>
    :root {
      --bg: #07080f;
      --text: #eef0fb;
      --muted: #9298c0;
      --faint: #6b7099;
      --accent: #a99bff;
      --accent2: #6fe3d2;
      --gold: #ffd8a8;
      --danger: #ff8098;
      /* 글래스 표면 */
      --glass: rgba(255, 255, 255, 0.045);
      --glass-strong: rgba(255, 255, 255, 0.07);
      --stroke: rgba(255, 255, 255, 0.09);
      --stroke-soft: rgba(255, 255, 255, 0.06);
      --shadow: 0 20px 50px -20px rgba(0, 0, 0, 0.7);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: "Pretendard", "Segoe UI", "Malgun Gothic", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 56px 18px 90px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow-x: hidden;
    }

    /* 배경에 떠다니는 은은한 오브 */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.5;
      z-index: -1;
      pointer-events: none;
      animation: drift 18s ease-in-out infinite alternate;
    }
    .orb.a { width: 460px; height: 460px; top: -140px; right: -120px;
      background: radial-gradient(circle, #6a5cff, transparent 70%); }
    .orb.b { width: 420px; height: 420px; bottom: -160px; left: -130px;
      background: radial-gradient(circle, #1f8f86, transparent 70%);
      animation-delay: -6s; }
    .orb.c { width: 300px; height: 300px; top: 40%; left: 55%;
      background: radial-gradient(circle, #b06a4a, transparent 70%);
      opacity: 0.3; animation-delay: -11s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(30px, -34px) scale(1.08); }
    }

    .wrap {
      max-width: 600px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 38px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.26em;
      text-indent: 0.26em;
      color: var(--accent2);
      background: var(--glass);
      border: 1px solid var(--stroke);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 7px 16px;
      border-radius: 999px;
      margin-bottom: 20px;
    }

    header h1 {
      font-size: clamp(2.1rem, 6vw, 2.7rem);
      font-weight: 800;
      letter-spacing: -0.035em;
      line-height: 1.15;
    }

    .grad {
      background: linear-gradient(110deg, var(--accent), var(--accent2) 42%, var(--gold));
      background-size: 220% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 6s linear infinite;
    }

    @keyframes shimmer {
      to { background-position: 220% center; }
    }

    header p {
      color: var(--muted);
      margin: 14px auto 0;
      max-width: 30rem;
      font-size: 0.97rem;
    }

    /* 공통 글래스 카드 */
    .form-card, .entry, .empty {
      background: var(--glass);
      border: 1px solid var(--stroke);
      backdrop-filter: blur(16px) saturate(120%);
      -webkit-backdrop-filter: blur(16px) saturate(120%);
      box-shadow: var(--shadow);
    }

    /* 입력 폼 */
    .form-card {
      position: relative;
      border-radius: 22px;
      padding: 26px 22px 22px;
      margin-bottom: 34px;
      overflow: hidden;
    }

    .form-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
      opacity: 0.7;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-bottom: 11px;
    }

    input, textarea {
      width: 100%;
      background: rgba(0, 0, 0, 0.22);
      border: 1px solid var(--stroke-soft);
      border-radius: 13px;
      color: var(--text);
      padding: 13px 15px;
      font-size: 0.98rem;
      font-family: inherit;
      transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
      resize: vertical;
    }

    input::placeholder, textarea::placeholder { color: var(--faint); }

    input:focus, textarea:focus {
      outline: none;
      border-color: rgba(169, 155, 255, 0.6);
      background: rgba(0, 0, 0, 0.32);
      box-shadow: 0 0 0 4px rgba(169, 155, 255, 0.14);
    }

    #name { max-width: 210px; }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
    }

    .count { color: var(--faint); font-size: 0.82rem; font-variant-numeric: tabular-nums; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 13px;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: inherit;
      transition: transform 0.1s, box-shadow 0.2s, filter 0.2s;
    }

    button:active { transform: translateY(1px); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0a0b14;
      padding: 12px 24px;
      box-shadow: 0 8px 22px -8px rgba(169, 155, 255, 0.7);
    }

    .btn-primary:hover { filter: brightness(1.06); box-shadow: 0 10px 26px -8px rgba(169, 155, 255, 0.9); }

    /* 목록 */
    .list-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 16px;
      padding: 0 6px;
    }

    .list-head h2 { font-size: 0.95rem; font-weight: 700; letter-spacing: 0.02em; color: var(--muted); }
    .list-head .total {
      color: var(--accent2);
      font-size: 0.82rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      background: var(--glass);
      border: 1px solid var(--stroke-soft);
      padding: 3px 11px;
      border-radius: 999px;
    }

    ul { list-style: none; }

    .entry {
      position: relative;
      border-radius: 18px;
      padding: 18px 20px;
      margin-bottom: 14px;
      animation: pop 0.32s cubic-bezier(.2,.8,.2,1);
      transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
    }

    .entry:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 255, 255, 0.16);
      box-shadow: 0 26px 54px -22px rgba(0, 0, 0, 0.8);
    }

    @keyframes pop {
      from { opacity: 0; transform: translateY(10px) scale(0.99); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .entry-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .who {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 1rem;
      color: #0a0b14;
      flex-shrink: 0;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.14), 0 6px 16px -6px rgba(0,0,0,0.6);
    }

    .name { font-weight: 700; font-size: 0.98rem; }
    .time { color: var(--faint); font-size: 0.76rem; font-variant-numeric: tabular-nums; }

    .msg {
      position: relative;
      color: #d9ddf6;
      white-space: pre-wrap;
      word-break: break-word;
      padding-left: 15px;
      border-left: 2px solid var(--stroke);
    }

    .del {
      background: transparent;
      color: var(--faint);
      padding: 5px 9px;
      font-size: 0.82rem;
      font-weight: 600;
      border-radius: 9px;
      opacity: 0;
      transition: opacity 0.18s, color 0.18s, background 0.18s;
    }

    .entry:hover .del { opacity: 1; }
    .del:hover { color: var(--danger); background: rgba(255, 128, 152, 0.12); }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 52px 24px;
      border-style: dashed;
      border-radius: 18px;
      font-size: 0.95rem;
    }

    footer {
      text-align: center;
      color: var(--faint);
      font-size: 0.78rem;
      margin-top: 40px;
      letter-spacing: 0.02em;
    }

    @media (max-width: 480px) {
      body { padding-top: 40px; }
      .row { flex-direction: column; }
      #name { max-width: 100%; }
      .del { opacity: 1; }
    }

    /* ===== 드래곤 무리 무대 ===== */
    .scene {
      position: fixed;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      overflow: hidden;
    }

    .d {
      position: absolute;
      width: var(--size, 100px);
      filter: drop-shadow(0 12px 16px rgba(0, 0, 0, 0.5));
      will-change: transform;
    }
    .d svg { width: 100%; height: auto; display: block; }

    /* 공통 파츠 애니메이션 */
    .d .eye { animation: blink 5s infinite; transform-origin: center; }
    @keyframes blink {
      0%, 92%, 100% { transform: scaleY(1); }
      95%, 97%      { transform: scaleY(0.12); }
    }
    .d .wing-l { transform-origin: 78px 66px; animation: flapL 1.4s ease-in-out infinite; }
    .d .wing-r { transform-origin: 42px 66px; animation: flapR 1.4s ease-in-out infinite; }
    @keyframes flapL { 0%,100% { transform: rotate(0); } 50% { transform: rotate(-18deg); } }
    @keyframes flapR { 0%,100% { transform: rotate(0); } 50% { transform: rotate(18deg); } }

    .flip svg { transform: scaleX(-1); }

    /* 비행: 화면을 가로지름 */
    .fly { top: var(--top, 12%); }
    .fly-a { animation: crossR 24s linear infinite; }
    .fly-b { animation: crossL 30s linear infinite; }
    .fly-c { animation: crossR 18s linear infinite; }
    .fly-d { animation: crossL 27s linear infinite; }
    @keyframes crossR {
      0%   { transform: translate(-24vw, 0); }
      25%  { transform: translate(24vw, -26px); }
      50%  { transform: translate(58vw, 12px); }
      75%  { transform: translate(90vw, -20px); }
      100% { transform: translate(128vw, 0); }
    }
    @keyframes crossL {
      0%   { transform: translate(128vw, 0); }
      25%  { transform: translate(88vw, -22px); }
      50%  { transform: translate(52vw, 14px); }
      75%  { transform: translate(22vw, -18px); }
      100% { transform: translate(-24vw, 0); }
    }

    /* 걷기: 바닥을 왕복 */
    .walk { bottom: 4px; animation: walkAcross 22s ease-in-out infinite; }
    .walk svg { animation: waddle 0.5s ease-in-out infinite; transform-origin: bottom center; }
    @keyframes walkAcross {
      0%   { transform: translateX(3vw)  scaleX(1); }
      47%  { transform: translateX(82vw) scaleX(1); }
      50%  { transform: translateX(82vw) scaleX(-1); }
      97%  { transform: translateX(3vw)  scaleX(-1); }
      100% { transform: translateX(3vw)  scaleX(1); }
    }
    @keyframes waddle {
      0%,100% { transform: translateY(0) rotate(-2.5deg); }
      50%     { transform: translateY(-4px) rotate(2.5deg); }
    }

    /* 나뭇가지에 거꾸로 매달리기 */
    .hang {
      top: 46px;
      left: 118px;
      transform-origin: top center;
      animation: sway 4s ease-in-out infinite;
    }
    .hang svg { transform: rotate(180deg); }
    @keyframes sway {
      0%,100% { transform: rotate(-9deg); }
      50%     { transform: rotate(9deg); }
    }

    /* 나뭇가지 */
    .branch {
      position: absolute;
      top: -8px;
      left: -12px;
      width: 240px;
      opacity: 0.95;
      filter: drop-shadow(0 8px 10px rgba(0,0,0,0.5));
    }

    /* 불 뿜기 */
    .fire { right: 3%; bottom: 4px; }
    .flame { opacity: 0; transform-origin: 60px 60px; }
    .fire .flame { animation: firebreath 3s ease-in-out infinite; }
    @keyframes firebreath {
      0%, 52%, 100% { opacity: 0; transform: scaleY(0.15) scaleX(0.5); }
      60%           { opacity: 1; transform: scaleY(1.08) scaleX(1); }
      74%           { opacity: 0.95; transform: scaleY(0.96) scaleX(1.04); }
      88%           { opacity: 0.5; transform: scaleY(0.7) scaleX(0.8); }
    }

    @media (max-width: 560px) {
      .fly-a, .fly-b, .fly-c, .fly-d { --size: 62px !important; }
      .walk { --size: 84px !important; }
      .fire { --size: 96px !important; }
      .hang { --size: 66px !important; left: 88px; }
      .branch { width: 180px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .orb, .grad, .entry, .d, .d *, .fly, .walk, .hang, .flame { animation: none; }
      html { scroll-behavior: auto; }
    }
  </style>
</head>
<body>
  <div class="orb a" aria-hidden="true"></div>
  <div class="orb b" aria-hidden="true"></div>
  <div class="orb c" aria-hidden="true"></div>

  <!-- 드래곤 무리 무대 (나이트 퓨어리 무드, 오리지널 디자인) -->
  <div class="scene" aria-hidden="true">
    <!-- 나뭇가지 (매달린 드래곤이 붙어 있음) -->
    <svg class="branch" viewBox="0 0 240 150">
      <path d="M-6 10 C60 22 118 50 176 100 C192 116 202 128 210 142"
            fill="none" stroke="#2f2117" stroke-width="12" stroke-linecap="round"/>
      <path d="M60 22 C48 12 36 14 30 24 C42 24 50 30 56 40 Z" fill="#25401f"/>
      <path d="M104 44 C94 32 82 33 76 43 C88 44 95 51 100 61 Z" fill="#2b4a24"/>
      <path d="M150 76 C142 63 130 62 122 71 C134 74 140 82 144 92 Z" fill="#25401f"/>
    </svg>
    <!-- 드래곤들은 아래 스크립트가 채워 넣습니다 -->
  </div>

  <div class="wrap">
    <header>
      <div class="badge">📖 GUESTBOOK</div>
      <h1><span class="grad">심가연</span>의 방명록</h1>
      <p>오늘 하루 어땠나요? 짧은 한마디, 안부, 아무 말이나 편하게 남겨 주세요 💌</p>
    </header>

    <!-- 입력 폼 -->
    <form class="form-card" id="form">
      <div class="row">
        <input id="name" type="text" maxlength="20" placeholder="이름 (예: 홍길동)" autocomplete="off" />
      </div>
      <div class="row">
        <textarea id="message" rows="2" maxlength="200" placeholder="남기고 싶은 한마디를 적어 주세요"></textarea>
      </div>
      <div class="actions">
        <span class="count"><span id="len">0</span>/200</span>
        <button type="submit" class="btn-primary">✍️ 남기기</button>
      </div>
    </form>

    <!-- 목록 -->
    <div class="list-head">
      <h2>남겨진 글</h2>
      <span class="total" id="total">0개</span>
    </div>
    <ul id="list"></ul>

    <footer>localStorage에 저장되어 새로고침해도 유지됩니다.</footer>
  </div>

  <script>
    const STORAGE_KEY = "guestbook.entries.v1";
    const AVATAR_COLORS = ["#7c8cff", "#59d3c4", "#ffb454", "#ff6b8a", "#b78cff", "#5ec8ff"];

    const form = document.getElementById("form");
    const nameEl = document.getElementById("name");
    const msgEl = document.getElementById("message");
    const lenEl = document.getElementById("len");
    const listEl = document.getElementById("list");
    const totalEl = document.getElementById("total");

    // 저장된 글 불러오기
    function load() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function save(entries) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }

    // 이름 첫 글자로 아바타 색상 결정 (일관성 위해 글자 코드 기반)
    function avatarColor(name) {
      const code = (name.codePointAt(0) || 0);
      return AVATAR_COLORS[code % AVATAR_COLORS.length];
    }

    function formatTime(ts) {
      const d = new Date(ts);
      const pad = (n) => String(n).padStart(2, "0");
      return `${d.getFullYear()}.${pad(d.getMonth() + 1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    function render() {
      const entries = load();
      totalEl.textContent = `${entries.length}개`;

      if (entries.length === 0) {
        listEl.innerHTML = `<li class="empty">아직 남겨진 글이 없어요.<br>첫 번째 방문자가 되어 보세요! ✨</li>`;
        return;
      }

      // 최신 글이 위로
      listEl.innerHTML = entries
        .slice()
        .reverse()
        .map((e) => {
          const initial = escapeHtml((e.name[0] || "?").toUpperCase());
          return `
            <li class="entry">
              <div class="entry-top">
                <div class="who">
                  <div class="avatar" style="background:${avatarColor(e.name)}">${initial}</div>
                  <div>
                    <div class="name">${escapeHtml(e.name)}</div>
                    <div class="time">${formatTime(e.time)}</div>
                  </div>
                </div>
                <button class="del" data-id="${e.id}" title="삭제">삭제</button>
              </div>
              <div class="msg">${escapeHtml(e.message)}</div>
            </li>`;
        })
        .join("");
    }

    // 글자 수 카운터
    msgEl.addEventListener("input", () => {
      lenEl.textContent = msgEl.value.length;
    });

    // 글 남기기
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const name = nameEl.value.trim();
      const message = msgEl.value.trim();

      if (!name || !message) {
        alert("이름과 메시지를 모두 입력해 주세요.");
        return;
      }

      const now = Date.now();
      const entries = load();
      entries.push({
        id: `${now}-${Math.floor(Math.random() * 1e6)}`,
        name,
        message,
        time: now,
      });
      save(entries);

      nameEl.value = "";
      msgEl.value = "";
      lenEl.textContent = "0";
      render();
      nameEl.focus();
    });

    // 삭제 (이벤트 위임)
    listEl.addEventListener("click", (e) => {
      const btn = e.target.closest(".del");
      if (!btn) return;
      if (!confirm("이 글을 삭제할까요?")) return;
      const id = btn.dataset.id;
      const entries = load().filter((x) => x.id !== id);
      save(entries);
      render();
    });

    render();

    // ===== 드래곤 무리 생성 =====
    (function () {
      const scene = document.querySelector(".scene");
      if (!scene) return;

      const EYES = {
        teal:   { hi: "#d6fff4", mid: "#59e3cf", lo: "#1f9f8f" },
        green:  { hi: "#eaffd0", mid: "#9be86a", lo: "#3f9f2f" },
        violet: { hi: "#f0e6ff", mid: "#b28cff", lo: "#6a3fd0" },
        amber:  { hi: "#fff0d0", mid: "#ffcf6a", lo: "#d0902f" },
        fire:   { hi: "#ffe0c0", mid: "#ff9a4a", lo: "#d0561f" },
      };

      // 아기 드래곤 SVG (앞모습 치비형, 큰 눈망울 + 귀날개 + 발 + 불)
      function dragon(i, eyeKey) {
        const e = EYES[eyeKey];
        const b = "body-" + i, g = "eye-" + i, f = "glow-" + i;
        return `
        <svg viewBox="0 0 120 132">
          <defs>
            <radialGradient id="${b}" cx="50%" cy="36%" r="72%">
              <stop offset="0%" stop-color="#26263e"/>
              <stop offset="60%" stop-color="#111120"/>
              <stop offset="100%" stop-color="#06060d"/>
            </radialGradient>
            <radialGradient id="${g}" cx="50%" cy="38%" r="62%">
              <stop offset="0%" stop-color="${e.hi}"/>
              <stop offset="48%" stop-color="${e.mid}"/>
              <stop offset="100%" stop-color="${e.lo}"/>
            </radialGradient>
            <filter id="${f}" x="-60%" y="-60%" width="220%" height="220%">
              <feGaussianBlur stdDeviation="2.4" result="bl"/>
              <feMerge><feMergeNode in="bl"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          <g class="wing-r"><path d="M46 62 C22 48 10 56 8 72 C22 68 34 70 44 80 Z" fill="#141428" stroke="#28284e" stroke-width="1.2"/></g>
          <g class="wing-l"><path d="M74 62 C98 48 110 56 112 72 C98 68 86 70 76 80 Z" fill="#141428" stroke="#28284e" stroke-width="1.2"/></g>

          <path d="M60 98 C58 112 49 118 40 121 C49 113 52 106 54 96 Z" fill="#0f0f1e"/>

          <ellipse cx="49" cy="104" rx="8" ry="6" fill="#0d0d1a"/>
          <ellipse cx="71" cy="104" rx="8" ry="6" fill="#0d0d1a"/>

          <ellipse cx="60" cy="84" rx="25" ry="21" fill="url(#${b})"/>
          <ellipse cx="60" cy="88" rx="12" ry="13" fill="#1a1a30" opacity="0.55"/>
